name: CI (Backend)

on:
  pull_request:
    paths:
      - "backend/**"
      - "firebase/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/ci_backend.yml"
  push:
    branches: [ main ]
    paths:
      - "backend/**"
      - "firebase/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/ci_backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  functions:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - run: npm ci
      - run: npm run build
      - run: npm run test:functions
      - name: Install Firebase CLI
        run: npm i -g firebase-tools
      - name: Run rules tests (emulators)
        working-directory: .
        run: |
          firebase emulators:exec --only firestore,storage \
            "npm --prefix backend/functions run test:rules"
      - name: Run integration flow tests (emulators)
        working-directory: .
        run: |
          firebase emulators:exec --only firestore,storage \
            "npm --prefix backend/functions run test:integration"
