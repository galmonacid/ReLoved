name: CI (Flutter E2E)

on:
  pull_request:
    paths:
      - "app/**"
      - "backend/functions/**"
      - "firebase/**"
      - "scripts/e2e/**"
      - ".github/workflows/ci_flutter_e2e.yml"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - "backend/functions/**"
      - "firebase/**"
      - "scripts/e2e/**"
      - ".github/workflows/ci_flutter_e2e.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - uses: browser-actions/setup-chrome@v1
        id: setup-chrome
        with:
          chrome-version: stable
          install-dependencies: true

      - name: Install matching ChromeDriver
        run: scripts/e2e/install_matching_chromedriver.sh "${{ steps.setup-chrome.outputs.chrome-path }}"

      - name: Flutter pub get
        run: flutter pub get
        working-directory: app

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend/functions

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Run smoke E2E test against emulators
        run: |
          xvfb-run -a env \
            E2E_HEADLESS=1 \
            CHROME_BINARY="${{ steps.setup-chrome.outputs.chrome-path }}" \
            E2E_TARGETS=integration_test/auth_search_smoke_test.dart \
            scripts/e2e/run_chat_e2e.sh
