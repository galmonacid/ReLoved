name: Deploy (Firebase backend)

on:
  workflow_run:
    workflows: ["CI (Backend)"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: read
    env:
      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      # Auth option A: Service account JSON (recommended for simplicity).
      # Set secret: FIREBASE_SERVICE_ACCOUNT
      - name: Auth to Google Cloud (service account)
        uses: google-github-actions/auth@v2
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT != '' }}
        with:
          credentials_json: ${{ env.FIREBASE_SERVICE_ACCOUNT }}

      # Auth option B: Workload Identity Federation.
      # Set secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
      - name: Auth to Google Cloud (workload identity)
        uses: google-github-actions/auth@v2
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' }}
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT }}

      - name: Validate auth configuration
        if: ${{ env.FIREBASE_SERVICE_ACCOUNT == '' && (env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || env.GCP_SERVICE_ACCOUNT == '') }}
        run: |
          echo "Missing auth configuration. Set FIREBASE_SERVICE_ACCOUNT or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT."
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Firebase CLI
        run: npm i -g firebase-tools@latest

      - name: Configure functions artifacts cleanup policy
        run: |
          firebase functions:artifacts:setpolicy --location=us-central1 --force

      - name: Build Functions
        working-directory: backend/functions
        run: |
          npm ci
          npm run build

      - name: Deploy Firestore rules/indexes + Storage rules + Functions
        run: |
          firebase --version
          firebase deploy --only firestore:rules,firestore:indexes,storage,functions
