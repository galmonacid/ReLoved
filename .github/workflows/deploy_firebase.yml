name: Deploy (Firebase backend)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      # Auth option A: Service account JSON (recommended for simplicity).
      # Set secret: FIREBASE_SERVICE_ACCOUNT
      - name: Auth to Google Cloud (service account)
        uses: google-github-actions/auth@v2
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' }}
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Auth option B: Workload Identity Federation.
      # Set secrets: GCP_WORKLOAD_IDENTITY_PROVIDER, GCP_SERVICE_ACCOUNT
      - name: Auth to Google Cloud (workload identity)
        uses: google-github-actions/auth@v2
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' }}
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Validate auth configuration
        if: ${{ secrets.FIREBASE_SERVICE_ACCOUNT == '' && (secrets.GCP_WORKLOAD_IDENTITY_PROVIDER == '' || secrets.GCP_SERVICE_ACCOUNT == '') }}
        run: |
          echo "Missing auth configuration. Set FIREBASE_SERVICE_ACCOUNT or both GCP_WORKLOAD_IDENTITY_PROVIDER and GCP_SERVICE_ACCOUNT."
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Firebase CLI
        run: npm i -g firebase-tools

      - name: Build Functions
        working-directory: backend/functions
        run: |
          npm ci
          npm run build

      - name: Deploy Firestore rules/indexes + Storage rules + Functions
        run: |
          firebase --version
          firebase deploy --only firestore:rules,firestore:indexes,storage,functions
