name: CI (iOS Release Build)

on:
  pull_request:
    paths:
      - "app/**"
      - ".github/workflows/**"
  push:
    branches: [ main ]
    paths:
      - "app/**"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ios-release-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: flutter pub get

      - name: Validate iOS release build
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=GOOGLE_SIGN_IN_IOS=true \
            --dart-define=PAYMENTS_ENABLED_IOS=false \
            --dart-define=SHARE_BASE_URL=https://reloved-greenhilledge.web.app
