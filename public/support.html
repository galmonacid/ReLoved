<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReLoved Support</title>
    <style>
      :root {
        color-scheme: light;
        --sage: #9caf88;
        --ink: #1f2a1f;
        --bg: #ffffff;
        --muted: #5b6b5b;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.6;
      }
      header {
        padding: 40px 20px 20px;
        border-bottom: 1px solid #e6ece6;
      }
      header h1 {
        margin: 0 0 8px;
        color: var(--sage);
        font-size: 28px;
      }
      header p {
        margin: 0;
        color: var(--muted);
      }
      main {
        max-width: 860px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }
      h2 {
        margin-top: 24px;
        color: var(--sage);
        font-size: 20px;
      }
      ul {
        padding-left: 20px;
      }
      a {
        color: var(--sage);
      }
      .card {
        border: 1px solid #e6ece6;
        border-radius: 12px;
        padding: 16px;
        margin-top: 16px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Support</h1>
      <p>Contact the ReLoved team.</p>
    </header>
    <main>
      <div class="card">
        <h2>Contact</h2>
        <p>
          Email us at
          <a href="mailto:team@greenhilledge.co.uk">team@greenhilledge.co.uk</a>.
        </p>
      </div>

      <div class="card">
        <h2>Legal</h2>
        <ul>
          <li><a href="/terms.html">Terms of Service</a></li>
          <li><a href="/privacy.html">Privacy Policy</a></li>
        </ul>
      </div>
    </main>
  </body>
</html>
